name: بناء تطبيق Android

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  # يسمح لك بتشغيل البناء يدوياً من علامة تبويب Actions
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. تحميل الكود من المستودع
        uses: actions/checkout@v4

      - name: 2. إعداد بيئة Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 3. إعداد Gradle (مع تخزين مؤقت للتحميلات)
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: wrapper

      - name: 4. منح صلاحية التنفيذ لـ gradlew
        run: chmod +x gradlew

      - name: 5. بناء ملف APK الخاص بالتجربة (Debug)
        run: ./gradlew assembleDebug

      - name: 6. رفع ملف APK الناتج (لتحميله)
        uses: actions/upload-artifact@v4
        with:
          name: تطبيق-ناقل-الملفات
          path: app/build/outputs/apk/debug/*.apk
